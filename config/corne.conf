# Increase Bluetooth wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable ZMK Studio for runtime keymap updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Uncomment to enable deep sleep (saves battery when idle)
# CONFIG_ZMK_SLEEP=y

# Uncomment to enable USB logging (increases power usage)
# CONFIG_ZMK_USB_LOGGING=y
